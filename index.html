<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowwections!!</title>
    <style>
        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            color: #000;
        }
        h1 { margin-bottom: 5px; font-weight: 700; }
        p.subtitle { margin-top: 0; margin-bottom: 20px; color: #555; }
        
        #game-board {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .solved-category {
            width: 100%;
            padding: 20px 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .solved-title { font-size: 1.1em; margin-bottom: 5px; text-transform: uppercase; }
        .solved-words { font-weight: normal; font-size: 0.9em; }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
        }

        .word-btn {
            background-color: #efefe6;
            border: none;
            border-radius: 5px;
            padding: 20px 10px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            word-wrap: break-word;
        }
        
        .word-btn:active { transform: scale(0.95); }
        .word-btn.selected { background-color: #5a594e; color: white; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-btn {
            padding: 12px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 30px;
            border: 1px solid #000;
            background: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .action-btn:hover { background-color: #f0f0f0; }
        .action-btn.submit { background-color: #000; color: white; }
        .action-btn.submit:hover { background-color: #333; }

        .mistakes { display: flex; align-items: center; gap: 10px; font-weight: bold; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background-color: #5a594e; }
        
        #message {
            height: 40px;
            font-weight: bold;
            color: white;
            background-color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 20%;
            z-index: 100;
        }

        /* Category Colors */
        .color-1 { background-color: #f9df6d; } /* Yellow */
        .color-2 { background-color: #a0c35a; } /* Green */
        .color-3 { background-color: #b0c4ef; } /* Blue */
        .color-4 { background-color: #ba81c5; } /* Purple */
    </style>
</head>
<body>

    <h1>Cowwections</h1>
    <p class="subtitle">Create four groups of four!</p>

    <div id="message">Message here</div>

    <div id="game-board">
        <div id="solved-areas"></div>
        <div id="grid"></div>
    </div>

    <div class="mistakes">
        Mistakes remaining: 
        <div id="mistake-dots" style="display: flex; gap: 5px;">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div class="controls">
        <button class="action-btn" onclick="shuffleGrid()">Shuffle</button>
        <button class="action-btn" onclick="deselectAll()">Deselect All</button>
        <button class="action-btn submit" onclick="submitGuess()">Submit</button>
    </div>

    <script>
        const categories = [
            { id: 1, color: "color-1", title: "FARM & BARNYARD", words: ["COW", "LOW", "MOW", "SOW"] },
            { id: 2, color: "color-2", title: "TYPED ON A KEYBOARD'S TOP ROW", words: ["POW", "ROW", "TOW", "WOW"] },
            { id: 3, color: "color-3", title: "TAKES '-EL' TO MAKE A NEW WORD", words: ["BOW", "HOW", "NOW", "VOW"] },
            { id: 4, color: "color-4", title: "SCRABBLE OBSCURITIES", words: ["DOW", "JOW", "KOW", "YOW"] }
        ];

        let activeWords = [];
        let selectedWords = [];
        let mistakes = 4;
        let solvedCount = 0;

        // Initialize game
        function init() {
            categories.forEach(cat => {
                cat.words.forEach(word => {
                    activeWords.push({ text: word, categoryId: cat.id });
                });
            });
            shuffleArray(activeWords);
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            activeWords.forEach(wordObj => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = wordObj.text;
                if (selectedWords.includes(wordObj.text)) btn.classList.add('selected');
                btn.onclick = () => toggleWord(wordObj.text);
                grid.appendChild(btn);
            });
        }

        function toggleWord(word) {
            const index = selectedWords.indexOf(word);
            if (index > -1) {
                selectedWords.splice(index, 1);
            } else {
                if (selectedWords.length < 4) selectedWords.push(word);
            }
            renderGrid();
        }

        function deselectAll() {
            selectedWords = [];
            renderGrid();
        }

        function shuffleGrid() {
            shuffleArray(activeWords);
            renderGrid();
        }

        function submitGuess() {
            if (selectedWords.length !== 4) {
                showMessage("Select four items!");
                return;
            }

            // Get full word objects for selected words
            const guessObjects = activeWords.filter(w => selectedWords.includes(w.text));
            
            // Check categories
            const categoryCounts = {};
            guessObjects.forEach(w => {
                categoryCounts[w.categoryId] = (categoryCounts[w.categoryId] || 0) + 1;
            });

            const counts = Object.values(categoryCounts);
            
            if (counts.includes(4)) {
                // Correct!
                const solvedCategoryId = guessObjects[0].categoryId;
                handleCorrectGuess(solvedCategoryId);
            } else if (counts.includes(3)) {
                // One away
                showMessage("One away!");
                handleIncorrectGuess();
            } else {
                // Incorrect
                showMessage("Incorrect guess!");
                handleIncorrectGuess();
            }
        }

        function handleCorrectGuess(categoryId) {
            const category = categories.find(c => c.id === categoryId);
            
            // Render solved banner
            const solvedAreas = document.getElementById('solved-areas');
            const banner = document.createElement('div');
            banner.className = `solved-category ${category.color}`;
            banner.innerHTML = `
                <div class="solved-title">${category.title}</div>
                <div class="solved-words">${category.words.join(', ')}</div>
            `;
            solvedAreas.appendChild(banner);

            // Remove from active words
            activeWords = activeWords.filter(w => w.categoryId !== categoryId);
            selectedWords = [];
            solvedCount++;

            if (solvedCount === 4) {
                showMessage("You Win!");
                document.querySelector('.controls').style.display = 'none';
            }
            
            renderGrid();
        }

        function handleIncorrectGuess() {
            mistakes--;
            renderMistakes();
            if (mistakes === 0) {
                showMessage("Better luck next time!");
                // Auto-solve the rest (simplified for this clone)
                document.querySelector('.controls').style.display = 'none';
                document.getElementById('grid').style.display = 'none';
                
                categories.forEach(cat => {
                    if (activeWords.some(w => w.categoryId === cat.id)) {
                        const solvedAreas = document.getElementById('solved-areas');
                        const banner = document.createElement('div');
                        banner.className = `solved-category ${cat.color}`;
                        banner.innerHTML = `<div class="solved-title">${cat.title}</div><div class="solved-words">${cat.words.join(', ')}</div>`;
                        solvedAreas.appendChild(banner);
                    }
                });
            }
        }

        function renderMistakes() {
            const dotsContainer = document.getElementById('mistake-dots');
            dotsContainer.innerHTML = '';
            for (let i = 0; i < mistakes; i++) {
                dotsContainer.innerHTML += '<div class="dot"></div>';
            }
        }

        function showMessage(msg) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            msgEl.style.display = 'flex';
            setTimeout(() => { msgEl.style.display = 'none'; }, 2000);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Start the game
        init();
    </script>
</body>
</html>
